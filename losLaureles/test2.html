<!DOCTYPE html>
<html>
<head>
<script>

// stores the device context of the canvas we use to draw the outlines
// initialized in myInit, used in myHover and myLeave
var hdc;

//Variable for storing the canvas. Initialized in Init
var can;

// shorthand func
function byId(e){return document.getElementById(e);}

// takes a string that contains coords eg - "227,307,261,309, 339,354, 328,371, 240,331"
// draws a line from each co-ord pair to the next - assumes starting point needs to be repeated as ending point.
function drawPoly(coOrdStr)
{
    var mCoords = coOrdStr.split(',');
    var i, n;
    n = mCoords.length;

    hdc.beginPath();
    hdc.moveTo(mCoords[0], mCoords[1]);
    for (i=2; i<n; i+=2)
    {
        hdc.lineTo(mCoords[i], mCoords[i+1]);
    }
    hdc.lineTo(mCoords[0], mCoords[1]);
    hdc.stroke();
}

function drawRect(coOrdStr)
{
    var mCoords = coOrdStr.split(',');
    var top, left, bot, right;
    left = mCoords[0];
    top = mCoords[1];
    right = mCoords[2];
    bot = mCoords[3];
    hdc.strokeRect(left,top,right-left,bot-top); 
}

function myHover(element)
{
    var hoveredElement = element;
    var coordStr = element.getAttribute('coords');
    var areaType = element.getAttribute('shape');
    var areaId = element.getAttribute("id");
    var areaClass=element.getAttribute("class");
    console.log(areaClass);
    switch (areaClass)
    {
        case 'tree1':
            drawImage("tree1")
            break;
        case "plant1":
            drawImage("plant1");
            break;
    }
}

function myLeave()
{
    var canvas = byId('myCanvas');
    //Clear all canvas
    hdc.clearRect(0, 0, canvas.width, canvas.height);
}

function drawImage(imageId){
    var image=document.getElementById(imageId);
    image.style.visibility="visible";
    hdc.drawImage(image,can.width/4,can.height/4,image.width,image.height);

}

function myInit()
{
    // get the target image
    var img = byId('PLANTAlaureles');

    var x,y, w,h;

    // get it's position and width+height
    x = img.offsetLeft;
    y = img.offsetTop;
    w = img.clientWidth;
    h = img.clientHeight;


    // move the canvas, so it's contained by the same parent as the image
    var imgParent = img.parentNode;
    can = byId('myCanvas');
    imgParent.appendChild(can);

    // place the canvas in front of the image
    can.style.zIndex = 1;

    // position it over the image
    can.style.left = x+'px';
    can.style.top = y+'px';

    // make same size as the image
    can.setAttribute('width', w+'px');
    can.setAttribute('height', h+'px');

    // get it's context
    hdc = can.getContext('2d');

    // set the 'default' values for the colour/width of fill/stroke operations
    hdc.fillStyle = 'red';
    hdc.strokeStyle = 'red';
    hdc.lineWidth = 2;
}
</script>

<style>
body
{
    background-color: gray;
}
canvas
{
    pointer-events: none;       /* make the canvas transparent to the mouse - needed since canvas is position infront of image */
    position: absolute;
}
</style>

<title></title>
</head>
<body onload='myInit()'>
    <canvas id='myCanvas'></canvas>     <!-- gets re-positioned in myInit(); -->
    <!-- images to be loaded later-->
    <img id="tree1"  src="./images/tree1.jpeg" width="300" height="227" style="display: none;">
    <img id="plant1"  src="./images/plant1.jpeg" width="300" height="227" style="display: none;">
    <!-- Background image-->
    <img src='./images/PLANTAlaureles.png' usemap='#laurelesMap' class='imgmap_css_container' title='PlanoLaureles' alt='PlanoLaureles' id='PLANTAlaureles' width="1000" height="auto"/>
    <!-- Map of the background image-->
    <map id='laurelesMap' name='imgmap_css_container_imgmap201293016112'>
        <area onmouseover='myHover(this);' onmouseout='myLeave();' class="tree1" target="" alt="tree1" title="tree1" href="" coords="203,552,35" shape="circle">
        <area onmouseover='myHover(this);' onmouseout='myLeave();' class="plant1" target="" alt="plant1" title="plant1" href="" coords="509,568,52" shape="circle">
        <area onmouseover='myHover(this);' onmouseout='myLeave();' class="plant1" target="" alt="plant2" title="plant2" href="" coords="908,122,37" shape="circle">
        <area onmouseover='myHover(this);' onmouseout='myLeave();' class="plant1" target="" alt="plant3" title="plant3" href="" coords="498,88,38" shape="circle">
        <area onmouseover='myHover(this);' onmouseout='myLeave();' class="tree1" target="" alt="Tree2" title="Tree2" href="" coords="216,123,35" shape="circle">

    </map>

    </body>
</html>
